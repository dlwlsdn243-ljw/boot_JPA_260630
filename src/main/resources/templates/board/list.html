<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md">
    <!--  여기가 main  -->
    <h1>Board List Page</h1>
    <div>
        <!--검색 라인-->
        <form action="/board/list" class="d-flex m-5">
            <select class="form-select w-25" name="type" aria-label="Default select example">
                <option selected>검색...</option>
                <option value="t">제목</option>
                <option value="w">작성자</option>
                <option value="c">내용</option>
                <option value="tc">재목 + 내용</option>
                <option value="wt">작성자 + 제목</option>
                <option value="cw">내용 + 작성자</option>
                <option value="twc">전체</option>
            </select>
            <input class="form-control me-2" name="keyword" type="search" placeholder="Search" aria-label="Search" />
            <input type="hidden" name="pageNo" value="1">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        <table class="table">
            <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">title</th>
                <th scope="col">writer</th>
                <th scope="col">regDate</th>
                <th scope="col">readCount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="board:${ph.list}">
                <th scope="row">[[${board.bno}]]</th>
                <td>
                    <a th:href="@{/board/detail(bno=${board.bno})}">[[${board.title}]]
                        <span class="badge text-bg-warning">[[${board.cmtQty}]]</span>
                        <span class="badge text-bg-primary">[[${board.fileQty}]]</span>
                    </a>
                </td>
                <td>[[${board.writer}]]</td>
                <td>[[${#strings.substring(board.regDate,0,10)}]]</td>
                <td>[[${board.readCount}]]</td>
            </tr>
            </tbody>
        </table>

        <!--paging line-->
        <nav aria-label="Page navigation example">
            <ul class="pagination justify-content-center" >
                <li class="page-item" th:classappend="${ph.prev eq false ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/board/list(pageNo=${ph.startPage}-1)}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <th:block th:each="i:${#numbers.sequence(ph.startPage, ph.endPage)}" >
                    <li class="page-item" th:classappend="${ph.pageNo == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/board/list(pageNo=${i})}">[[${i}]]</a>
                    </li>
                </th:block>

                <li class="page-item" th:classappend="${ph.next eq false ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/board/list(pageNo=${ph.endPage}+1)}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</div>
