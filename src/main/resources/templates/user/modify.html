<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md my-5">
<!--    &lt;!&ndash;  여기가 main  &ndash;&gt;-->
<!--    <h1 class="mb-3">User Modify Page</h1>-->
    <form action="/user/modify" method="post">
        <!--CSRF 토큰 추가-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="col m-2">
            <div class="card border-dark mb-3" style="max-width: 540px;">
                <div class="row g-0">
                    <div class="col-md-4">
                        <img src="/image/image3.jpeg" class="img-fluid rounded-start" alt="...">
                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <input type="hidden" name="email" th:value="${userDTO.email}">
                            <h5 class="card-title">
                                <label>닉네임</label>
                                <input type="text" name="nickName" class="form-control" th:value="${userDTO.nickName }">
                                <label>비밀번호</label>
                                <input type="text" name="pwd" class="form-control" placeholder="password...">
                            </h5>
                            <label>이메일</label>
                            <p class="card-text">[[${userDTO.email }]] </p>
                            <p class="card-text">RegisterDate [[${userDTO.regDate }]] </p>

<!--                            <p class="card-text"><small class="text-body-secondary">Last login [[${userDTO.lastLogin }]] ago</small></p>-->
                            <th:block th:each="auths:${userDTO.authList}">
                                <span class="badge rounded-pill text-bg-success">[[${auths.role }]]</span>
                            </th:block>
                            <button type="submit" class="btn btn-primary btn-sm">수정</button>
                            <a th:href="@{/user/remove}">
                                <button type="button" class="btn btn-danger btn-sm">삭제</button>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <script th:inline="javascript">
        const modMsg = [[${modMsg}]];
        const delMsg = [[${delMsg}]];
        if(modMsg==='fail'){
            alert("회원정보 수정 실패!! 다시 시도해주세요.");
        }

        if(delMsg==='fail'){
            alert("회원탈퇴 실패!! 다시 시도해주세요.");
        }
    </script>
</div>
