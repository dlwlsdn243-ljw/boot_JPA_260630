<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md my-5">
    <!--  여기가 main  -->
    <!--/board/register.html-->
    <h1>Board Register Page</h1>
    <form action="/board/register" method="post" enctype="multipart/form-data" class="my-5">
        <!--CSRF 토큰 추가-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="t" class="form-label">제목</label>
            <input type="text" class="form-control" name="title" id="t" placeholder="title...">
        </div>
        <div class="mb-3">
            <label for="w" class="form-label">작성자</label>
            <input type="text" class="form-control" id="w" name="writer" th:value="${#authentication.name}" readonly>
        </div>
        <div class="mb-3">
            <label for="c" class="form-label">내용</label>
            <textarea class="form-control" id="c" name="content" rows="10" cols="30"></textarea>
        </div>
        <!-- file upload 추가 -->
        <div class="mb-3">
            <!--multiple 하나의 input에 여러개의 파일 업로드-->
            <input type="file" class="form-control" id="file"
                   name="files" multiple style="display: none">
            <button type="button" id="trigger" class="btn btn-outline-dark">첨부파일</button>
        </div>
        <!--file print-->
        <div class="mb-3" id="fileZone"></div>

        <button type="submit" class="btn btn-primary" id="regBtn">등록</button>

        <script th:src="@{/js/boardRegister.js}"></script>

    </form>
</div>
