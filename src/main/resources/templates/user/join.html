<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md my-5">
    <!--  여기가 main  -->
    <h1>Join Page</h1>
    <form action="/user/join" method="post">
        <!--CSRF 토큰 추가-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="e" class="form-label">이메일</label>
            <div class="input-group">
                <input type="text" class="form-control" name="email" id="e" placeholder="test@test.com">
                <button type="button" class="btn btn-primary" id="emailCheckBtn">중복확인</button>
            </div>
        </div>
        <div class="mb-3">
            <label for="p" class="form-label">비밀번호</label>
            <input type="password" class="form-control" name="pwd" id="p" placeholder="password...">
        </div>
        <div class="mb-3">
            <label for="n" class="form-label">닉네임</label>
            <input type="text" class="form-control" name="nickName" id="n" placeholder="nickName...">
        </div>
        <button type="submit" class="btn btn-primary">회원가입</button>
    </form>

    <script>
        document.getElementById("emailCheckBtn")
            .addEventListener("click",()=>{
                const email = document.getElementById("e").value;

                if(email.trim() === ""){
                    alert("이메일을 입력하세요");
                    return;
                }
                /*fetch()는 JavaScript에서 서버와 통신하는 함수*/
                fetch("/user/emailCheck?email=" + email)
                    .then(res => res.json())
                    .then(data => {
                        if(data){
                            alert("이미 사용중인 이메일입니다.");
                        }else{
                            alert("사용 가능한 이메일입니다.");
                        }
                    })
                    .catch(err => {
                        console.log(err);
                        alert("이메일 확인 중 오류가 발생했습니다.");
                    });
            });
    </script>
</div>
