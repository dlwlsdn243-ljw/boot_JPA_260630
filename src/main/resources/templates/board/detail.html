<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md">
    <!--여기가 main-->
    <h1>[ NO [[${board.bno}]] ] Detail Page</h1>
    <form action="/board/update" method="post" class="my-5" id="modForm">
        <input type="hidden" name="bno" th:value="${board.bno}">
        <div class="mb-3">
            <label for="t" class="form-label">Title</label>
            <input type="text" class="form-control" readonly name="title" id="t" th:value="${board.title}">
        </div>
        <div class="mb-3">
            <label for="w" class="form-label">Writer</label>
            <input type="text" class="form-control" readonly name="writer" id="w" th:value="${board.writer}">
        </div>
        <div class="mb-3">
            <label for="r" class="form-label">regDate</label>
            <input type="text" class="form-control"  readonly  id="r" th:value="${#temporals.format(board.regDate,'yyyy-MM-dd HH:mm:ss')}">
        </div>
        <div class="mb-3">
            <label for="c" class="form-label">Contents</label>
            <textarea class="form-control" name="content"  id="c" readonly rows="10" cols="10" th:text="${board.content}"></textarea>
        </div>
        <a href="#" class="text-decoration-none">
            <button type="button" id="modBtn" class="btn btn-warning" >modify</button>
        </a>
        <a th:href="@{/board/remove(bno=${board.bno})}" class="text-decoration-none">
            <button type="button"  id="delBtn" class="btn btn-secondary" >delete</button>
        </a>
        <a th:href="@{/board/list}" class="text-decoration-none">
            <button type="button" id="listBtn" class="btn btn-primary" >list</button>
        </a>

        <!--댓글 라인-->
        <div id="comment">
            <!--댓글 입력-->
            <div class="input-group my-3">
                <span class="input-group-text" id="cmtWriter">writer</span>
                <input type="text" class="form-control" id="cmtText" placeholder="comment..." aria-label="Username" aria-describedby="basic-addon1">
                <button type="button" id="cmtAddBtn" class="btn btn-primary">등록</button>
            </div>

            <!--댓글 출력-->
            <ul class="list-group list-group-flush" id="cmtListArea">
                <li class="list-group-item" >
                    <div class="ms-2 me-auto">
                        <div class="fw-bole">writer</div>
                        content가 많아지면 글자는 어떻게 될까요???
                    </div>
                    <span class="badge rounded-pill text-bg-primary">등록일</span>
                    <button type="button" class="btn btn-outline-warning btn-sm">수정</button>
                    <button type="button" class="btn btn-outline-danger btn-sm">취소</button>
                </li>
            </ul>

        </div>


        <script th:src="@{/js/boardModify.js}"></script>
        <script th:src="@{/js/boardComment.js}"></script>
    </form>
</div>
