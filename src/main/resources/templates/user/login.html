<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<div layout:fragment="content" class="container-md my-5">
    <!--  여기가 main  -->
    <h1>Login Page</h1>
    <form action="/user/login" method="post">
        <!--CSRF 토큰 추가-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="e" class="form-label">이메일</label>
            <input type="text" class="form-control" name="email" id="e" placeholder="test@test.com">
        </div>
        <div class="mb-3">
            <label for="p" class="form-label">비밀번호</label>
            <input type="password" class="form-control" name="pwd" id="p" placeholder="password...">
        </div>
        <div class="mb-3 text-danger" th:if="${errMsg ne null}">
            [[${errMsg}]]
        </div>

        <button type="submit" class="btn btn-primary">로그인</button>
    </form>

</div>
